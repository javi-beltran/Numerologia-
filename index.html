<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Numeroscopio Profesional - Manual de Martínez</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 850px; margin: 20px auto; padding: 20px; background-color: #f8f9fa; color: #333; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: #1a3a5a; text-align: center; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input { padding: 12px; margin: 8px 0; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
        button { flex: 1; min-width: 150px; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn-calc { background: #3498db; color: white; }
        .btn-print { background: #95a5a6; color: white; display: none; }
        .btn-whatsapp { background: #25d366; color: white; display: none; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }

        .result-box { margin-top: 20px; padding: 15px; background: #f1f8ff; border-left: 6px solid #3498db; border-radius: 8px; page-break-inside: avoid; }
        .meaning { display: block; margin-top: 5px; font-style: italic; color: #555; font-size: 0.95em; }
        .calc-title { font-weight: bold; color: #1a3a5a; font-size: 1.1em; display: block; border-bottom: 1px solid #d1e2f3; margin-bottom: 5px; }

        @media print {
            .no-print { display: none !important; }
            .container { box-shadow: none; width: 100%; border: none; }
            .result-box { border: 1px solid #ddd; background: white; margin-bottom: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="no-print">
        <h1>Calculadora Numerológica Martínez</h1>
        <p style="text-align: center;">Basado estrictamente en el <em>Manual de Numerología</em> de Daniel J. Martínez.</p>
        
        <label>Nombre Completo (como figura en el documento):</label>
        <input type="text" id="nombre" placeholder="Ej: CLAUDIA ANDREA PERAEZ">
        
        <label>Fecha de Nacimiento:</label>
        <input type="date" id="fecha">
    </div>

    <div class="btn-group no-print">
        <button class="btn-calc" onclick="realizarCalculos()">Realizar Operaciones</button>
        <!-- <button id="btnWasp" class="btn-whatsapp" onclick="compartirWhatsApp()">Compartir WhatsApp</button> -->
        <button id="btnPrint" class="btn-print" onclick="window.print()">Imprimir Reporte</button>
    </div>

    <div id="resultados"></div>
</div>

<script>
    const tabla = {
        'a':1, 'j':1, 's':1, 'b':2, 'k':2, 't':2, 'c':3, 'l':3, 'u':3,
        'd':4, 'm':4, 'v':4, 'e':5, 'n':5, 'ñ':5, 'w':5, 'f':6, 'o':6, 'x':6,
        'g':7, 'p':7, 'y':7, 'h':8, 'q':8, 'z':8, 'i':9, 'r':9
    };

    let reporteWhatsApp = "";

    function reducir(n) {
        if (n === 11 || n === 22) return n;
        while (n > 9) {
            n = n.toString().split('').reduce((a, b) => a + parseInt(b), 0);
            if (n === 11 || n === 22) return n;
        }
        return n;
    }

    function esVocal(letra, palabra) {
        const v = "aeiou";
        const l = letra.toLowerCase();
        if (v.includes(l)) return true;
        if (l === 'y') {
            let i = palabra.indexOf(letra);
            let ant = palabra[i-1] ? v.includes(palabra[i-1].toLowerCase()) : false;
            let post = palabra[i+1] ? v.includes(palabra[i+1].toLowerCase()) : false;
            return !(ant || post);
        }
        return false;
    }

    // Significados extraídos del Manual de Martínez
    const textosGeneral = {
        1: "Independiente, líder y creativo.", 2: "Diplomático y cooperador.",
        3: "Autoexpresivo y sociable.", 4: "Práctico y organizado.",
        5: "Libre y versátil.", 6: "Hogareño y responsable.",
        7: "Analítico y espiritual.", 8: "Ejecutivo y equilibrado.",
        9: "Humanitario y generoso.", 11: "Inspirado y guía.", 22: "Gran constructor."
    };

    const textosSendero = {
        1: "Aprender a ser precursor, original y creativo. Ponerse primero sin dejarse de lado.",
        2: "Aprender a trabajar de a dos, en sociedades y no ser individualista.",
        3: "Aprender a encontrar la absoluta verdad y animarse a transitarla con fluidez.",
        4: "Aprender a ser práctico, digno de confianza y a recibir órdenes.",
        5: "Absoluta necesidad de aprender a ser libre, versátil y desapegado.",
        6: "Aprender a asumir cualquier responsabilidad importante en el hogar o comunidad.",
        7: "Obligación de especializarse, ser un pensador profundo y adquirir confianza.",
        8: "Aprender a conducir y organizar con equilibrio entre lo material y espiritual.",
        9: "Grado de evolución más difícil: ser humanitario, desinteresado e impersonal.",
        11: "Llamado a ser maestro y guía de los demás, perteneciendo al público.",
        22: "Llamado a ser líder en lo constructivo y material, trascendiendo fronteras."
    };

    const textosPotencial = {
        1: "Oportunidad de mandar, dirigir y conducir de forma independiente.",
        2: "Inclinación a las bellas artes y capacidad para ser un sabio consejero.",
        3: "Oportunidad de verdadera autoexpresión en oratoria, literatura o arte.",
        4: "Capacidad para concretar metas con sentido práctico, constancia y tesón.",
        5: "Oportunidad de recoger mucha experiencia de vida y libertad para viajar.",
        6: "Oportunidad de servicio a la comunidad; facultades de 'padre universal'.",
        7: "Momento de seguir fines mentales y espirituales, perfeccionando conocimientos.",
        8: "Gran posibilidad de expansión, fama, poder y reconocimiento ejecutivo.",
        9: "Momento de ser un gran hermano de la humanidad; felicidad radicará en dar.",
        11: "Posibilidad de lograr notoriedad como líder religioso o maestro inspirado.",
        22: "Oportunidad de reconocimiento internacional trabajando en beneficio del mundo."
    };

    function realizarCalculos() {
        const nombreCrudo = document.getElementById('nombre').value.trim();
        const fechaStr = document.getElementById('fecha').value;

        if (!nombreCrudo || !fechaStr) {
            alert("Por favor, ingrese sus datos completos.");
            return;
        }

        const nombres = nombreCrudo.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").split(/\s+/);
        let escT = 0, imgT = 0, desT = 0, letrasT = 0;

        nombres.forEach(p => {
            let v = 0, c = 0;
            for (let letra of p) {
                if (tabla[letra]) {
                    letrasT++;
                    if (esVocal(letra, p)) v += (letra === 'y' ? 9 : tabla[letra]);
                    else c += tabla[letra];
                }
            }
            escT += reducir(v);
            imgT += reducir(c);
            desT += reducir(reducir(v) + reducir(c));
        });

        const esencia = reducir(escT);
        const imagen = reducir(imgT);
        const destino = reducir(desT);

        const f = new Date(fechaStr + 'T00:00:00');
        const d = f.getDate(), m = f.getMonth() + 1, a = f.getFullYear();
        const aRed = reducir(a.toString().split('').reduce((x, y) => x + parseInt(y), 0));
        const sendero = reducir(m + d + aRed);
        const potencial = reducir(destino + sendero);

        document.getElementById('resultados').innerHTML = `
            <div style="text-align: center; margin-top:20px;">
                <h3 style="margin:0;">Numeroscopio Personal</h3>
                <p><strong>Para:</strong> ${nombreCrudo.toUpperCase()} | <strong>Nacimiento:</strong> ${d}/${m}/${a}</p>
            </div>
            <div class="result-box"><span class="calc-title">1. ESENCIA (Deseo Interno): ${esencia}</span><span class="meaning">${textosGeneral[esencia]}</span></div>
            <div class="result-box"><span class="calc-title">2. IMAGEN (Yo Externo): ${imagen}</span><span class="meaning">${textosGeneral[imagen]}</span></div>
            <div class="result-box"><span class="calc-title">3. DESTINO (Misión): ${destino}</span><span class="meaning">${textosGeneral[destino]}</span></div>
            <div class="result-box">
                <span class="calc-title">4. SENDERO NATAL (Lección Evolutiva): ${sendero}</span>
                <span class="meaning"><strong>Misión:</strong> ${textosSendero[sendero]}</span>
            </div>
            <div class="result-box">
                <span class="calc-title">5. NÚMERO POTENCIAL (Plenitud Final): ${potencial}</span>
                <span class="meaning"><strong>Potencial:</strong> ${textosPotencial[potencial]}</span>
            </div>
            <div class="result-box">
                <span class="calc-title">6. CICLO DE LETRAS: ${letrasT} años</span>
                <span class="meaning">Indica que a los ${letrasT} años, y en sus mitades, ocurrirán hechos trascendentes.</span>
            </div>
        `;

        reporteWhatsApp = `*MI NUMEROSCOPIO*%0A*Nombre:* ${nombreCrudo.toUpperCase()}%0A*Esencia:* ${esencia}%0A*Imagen:* ${imagen}%0A*Destino:* ${destino}%0A*Sendero Natal:* ${sendero}%0A*Número Potencial:* ${potencial}`;

        document.getElementById('btnWasp').style.display = 'block';
        document.getElementById('btnPrint').style.display = 'block';
    }

    function compartirWhatsApp() {
        const url = `https://wa.me/?text=${reporteWhatsApp}`;
        window.open(url, '_blank');
    }
</script>
</body>
</html>
